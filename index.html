 <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花立山養鰻 アプリランチャー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#f5f0e8;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Helvetica Neue',Arial,sans-serif;
  padding:24px;
}
h1{
  font-size:14px;
  color:#888;
  letter-spacing:2px;
  margin-bottom:32px;
  text-align:center;
}
.cards{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  justify-content:center;
}
.card{
  width:260px;
  background:#faf7f2;
  border-radius:24px;
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
  overflow:hidden;
  cursor:pointer;
  text-decoration:none;
  transition:transform 0.2s, box-shadow 0.2s;
  display:block;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 36px rgba(0,0,0,0.18);
}
.card-body{
  padding:32px 24px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.eel-circle{
  width:160px;
  height:160px;
  position:relative;
  margin-bottom:12px;
}
.circle-svg{
  width:100%;
  height:100%;
}
.ps-text{
  font-size:40px;
  font-weight:900;
  color:#1a1a1a;
  letter-spacing:-2px;
  line-height:1;
}
.sub-text{
  font-size:13px;
  color:#1a1a1a;
  letter-spacing:1px;
  margin-top:2px;
}
.year-text{
  font-size:16px;
  color:#c0392b;
  font-weight:700;
  margin-top:2px;
}
.stamp{
  position:absolute;
  right:-8px;
  bottom:8px;
  background:#c0392b;
  color:#fff;
  font-size:10px;
  font-weight:700;
  padding:6px 7px;
  border-radius:4px;
  line-height:1.4;
  text-align:center;
  writing-mode:vertical-rl;
  letter-spacing:2px;
  border:2px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.card-footer{
  background:#e8e0d0;
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card-footer span{
  font-size:11px;
  color:#555;
  word-break:break-all;
}
.wave-bg{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:50px;
  opacity:0.15;
}
@media(max-width:600px){
  .cards{gap:16px;}
  .card{width:100%;max-width:320px;}
}
</style>
</head>
<body>
<h1>HANATATE SYSTEMS</h1>
<div class="cards">

  <!-- BMS -->
  <a class="card" href="https://hanatate-bms.vercel.app" target="_blank">
    <div class="card-body">
      <div class="eel-circle">
        <svg class="circle-svg" viewBox="0 0 160 160">
          <!-- 波模様背景 -->
          <defs>
            <pattern id="wave1" x="0" y="0" width="20" height="10" patternUnits="userSpaceOnUse">
              <path d="M0 5 Q5 0 10 5 Q15 10 20 5" fill="none" stroke="#c8b89a" stroke-width="1"/>
            </pattern>
          </defs>
          <rect x="0" y="100" width="160" height="60" fill="url(#wave1)" opacity="0.5"/>
          <!-- 円形ブラシ風 -->
          <circle cx="80" cy="75" r="58" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="320 40" stroke-dashoffset="20" opacity="0.85"/>
          <!-- 鰻シルエット -->
          <ellipse cx="80" cy="18" rx="14" ry="7" fill="#1a1a1a" transform="rotate(-30 80 18)"/>
          <path d="M72 16 Q60 8 55 18 Q60 24 72 20" fill="#1a1a1a"/>
          <!-- テキスト -->
          <text x="80" y="68" text-anchor="middle" font-size="36" font-weight="900" fill="#1a1a1a" font-family="Arial">PS</text>
          <text x="80" y="88" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial" letter-spacing="2">HANATATE</text>
          <text x="80" y="106" text-anchor="middle" font-size="14" fill="#c0392b" font-family="Arial" font-weight="700">2026</text>
        </svg>
        <div class="stamp">受注<br/>売上<br/>管理</div>
      </div>
    </div>
    <div class="card-footer">
      <span>🌐</span>
      <span>hanatate-bms.vercel.app</span>
    </div>
  </a>

  <!-- ERP -->
  <a class="card" href="https://hanatate-erp2.vercel.app" target="_blank">
    <div class="card-body">
      <div class="eel-circle">
        <svg class="circle-svg" viewBox="0 0 160 160">
          <defs>
            <pattern id="wave2" x="0" y="0" width="20" height="10" patternUnits="userSpaceOnUse">
              <path d="M0 5 Q5 0 10 5 Q15 10 20 5" fill="none" stroke="#c8b89a" stroke-width="1"/>
            </pattern>
          </defs>
          <rect x="0" y="100" width="160" height="60" fill="url(#wave2)" opacity="0.5"/>
          <circle cx="80" cy="75" r="58" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="320 40" stroke-dashoffset="20" opacity="0.85"/>
          <ellipse cx="80" cy="18" rx="14" ry="7" fill="#1a1a1a" transform="rotate(-30 80 18)"/>
          <path d="M72 16 Q60 8 55 18 Q60 24 72 20" fill="#1a1a1a"/>
          <text x="80" y="68" text-anchor="middle" font-size="36" font-weight="900" fill="#1a1a1a" font-family="Arial">PS</text>
          <text x="80" y="92" text-anchor="middle" font-size="14" fill="#1a1a1a" font-family="Arial" letter-spacing="3">ERP</text>
        </svg>
        <div class="stamp">現場<br/>管理</div>
      </div>
    </div>
    <div class="card-footer">
      <span>🌐</span>
      <span>hanatate-erp2.vercel.app</span>
    </div>
  </a>

</div>

<p style="margin-top:32px;font-size:11px;color:#aaa;letter-spacing:1px;">© 2026 花立山養鰻株式会社</p>
</body>
</html>
