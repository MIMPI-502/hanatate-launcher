 <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花立山養鰻</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#080c0a;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Noto Serif JP',serif;
  padding:40px 16px;
  position:relative;
  overflow:hidden;
}
/* 背景の水紋エフェクト */
body::before{
  content:'';position:absolute;top:50%;left:50%;
  width:800px;height:800px;
  border-radius:50%;
  border:1px solid rgba(212,175,55,0.06);
  transform:translate(-50%,-50%);
  animation:ripple 6s ease-in-out infinite;
}
body::after{
  content:'';position:absolute;top:50%;left:50%;
  width:600px;height:600px;
  border-radius:50%;
  border:1px solid rgba(212,175,55,0.04);
  transform:translate(-50%,-50%);
  animation:ripple 6s ease-in-out infinite 2s;
}
@keyframes ripple{
  0%{transform:translate(-50%,-50%) scale(0.95);opacity:0.5;}
  50%{transform:translate(-50%,-50%) scale(1.05);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(0.95);opacity:0.5;}
}
.header{text-align:center;margin-bottom:48px;position:relative;z-index:1;}
.header-kanji{
  font-size:28px;font-weight:900;
  background:linear-gradient(180deg,#d4af37 0%,#f5d978 50%,#d4af37 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:6px;margin-bottom:6px;
}
.header-sub{font-size:10px;color:rgba(212,175,55,0.5);letter-spacing:4px;}
.cards{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1;}
.card{
  width:260px;
  background:linear-gradient(145deg,#0f1a12 0%,#0a110d 100%);
  border:1px solid rgba(212,175,55,0.25);
  border-radius:4px;
  cursor:pointer;text-decoration:none;
  transition:transform 0.3s,box-shadow 0.3s,border-color 0.3s;
  display:block;
  box-shadow:0 4px 24px rgba(0,0,0,0.8), inset 0 1px 0 rgba(212,175,55,0.1);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.4),transparent);
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 60px rgba(0,0,0,0.9),0 0 40px rgba(212,175,55,0.08);
  border-color:rgba(212,175,55,0.5);
}
.card-top{
  padding:32px 24px 24px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.eel-svg{width:180px;height:180px;}
.card-label{
  margin-top:16px;
  padding:6px 20px;
  border:1px solid rgba(212,175,55,0.3);
  font-size:11px;color:rgba(212,175,55,0.7);
  letter-spacing:3px;
  background:rgba(212,175,55,0.04);
}
.stamp{
  position:absolute;top:16px;right:16px;
  background:#8b1a1a;
  color:#f5f0e8;font-size:8px;font-weight:700;
  padding:6px 5px;border-radius:2px;
  line-height:1.8;text-align:center;
  writing-mode:vertical-rl;letter-spacing:3px;
  border:1.5px solid rgba(245,240,232,0.6);
  box-shadow:0 2px 8px rgba(139,26,26,0.5);
}
.card-footer{
  border-top:1px solid rgba(212,175,55,0.15);
  padding:10px 16px;
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.3);
}
.card-footer .url{font-size:9px;color:rgba(212,175,55,0.4);font-family:monospace;letter-spacing:0.5px;}
.footer{margin-top:48px;font-size:9px;color:rgba(212,175,55,0.25);letter-spacing:3px;position:relative;z-index:1;}
/* 区切り線 */
.divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.3),transparent);margin:0 auto 48px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-kanji">花 立 山 養 鰻</div>
  <div class="header-sub">HANATATE EEL FARM SYSTEMS</div>
</div>
<div class="divider"></div>

<div class="cards">

  <!-- BMS -->
  <a class="card" href="https://hanatate-bms.vercel.app" target="_blank">
    <div class="card-top">
      <div class="stamp">受注<br/>売上<br/>管理</div>
      <svg class="eel-svg" viewBox="0 0 180 180">
        <defs>
          <radialGradient id="g1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(212,175,55,0.03)"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <pattern id="wave1" x="0" y="0" width="14" height="7" patternUnits="userSpaceOnUse">
            <path d="M0 3.5 Q3.5 0 7 3.5 Q10.5 7 14 3.5" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="0.6"/>
          </pattern>
        </defs>
        <!-- 背景円グロー -->
        <circle cx="90" cy="90" r="80" fill="url(#g1)"/>
        <!-- 波模様 -->
        <rect x="20" y="120" width="140" height="60" fill="url(#wave1)"/>
        <!-- 金色の外枠円 -->
        <circle cx="90" cy="90" r="68" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
        <!-- 墨絵風の太い円（鰻の軌跡） -->
        <path d="M90 22 A68 68 0 1 1 89.9 22" fill="none" stroke="#1a1a1a" stroke-width="12"
          stroke-dasharray="380 48" stroke-dashoffset="0" stroke-linecap="round" opacity="0.9"/>
        <!-- 鰻シルエット（上部を横断） -->
        <!-- 体 -->
        <path d="M28 72 Q35 42 60 30 Q90 18 118 30 Q138 40 148 62
                 Q142 68 134 62 Q118 46 90 38 Q62 30 45 48 Q36 60 38 76Z" fill="#1c1c1c"/>
        <!-- 頭 -->
        <ellipse cx="147" cy="66" rx="11" ry="8" fill="#1c1c1c" transform="rotate(25 147 66)"/>
        <!-- 目 -->
        <circle cx="152" cy="61" r="2.5" fill="#d4af37" opacity="0.8"/>
        <circle cx="152" cy="61" r="1.2" fill="#080c0a"/>
        <!-- ヒレ -->
        <path d="M100 22 Q106 10 114 17 Q108 24 100 22Z" fill="#1c1c1c"/>
        <path d="M70 26 Q72 12 80 17 Q77 26 70 26Z" fill="#1c1c1c"/>
        <!-- しっぽ -->
        <path d="M32 75 Q16 66 13 80 Q24 88 36 82Z" fill="#1c1c1c"/>
        <!-- 中央テキスト -->
        <text x="90" y="84" text-anchor="middle" font-size="26" font-weight="900" fill="#d4af37" font-family="'Helvetica Neue',Arial" opacity="0.9">PS</text>
        <text x="90" y="99" text-anchor="middle" font-size="8.5" fill="rgba(212,175,55,0.6)" font-family="Arial" letter-spacing="2.5">HANATATE</text>
        <text x="90" y="114" text-anchor="middle" font-size="11" fill="#8b1a1a" font-family="Arial" font-weight="800" letter-spacing="1">2026</text>
      </svg>
      <div class="card-label">販 売 管 理 シ ス テ ム</div>
    </div>
    <div class="card-footer">
      <span style="font-size:10px;color:rgba(212,175,55,0.4);">🌐</span>
      <span class="url">hanatate-bms.vercel.app</span>
    </div>
  </a>

  <!-- ERP -->
  <a class="card" href="https://hanatate-erp2.vercel.app" target="_blank">
    <div class="card-top">
      <div class="stamp">現場<br/>管理</div>
      <svg class="eel-svg" viewBox="0 0 180 180">
        <defs>
          <radialGradient id="g2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(212,175,55,0.03)"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
          <pattern id="wave2" x="0" y="0" width="14" height="7" patternUnits="userSpaceOnUse">
            <path d="M0 3.5 Q3.5 0 7 3.5 Q10.5 7 14 3.5" fill="none" stroke="rgba(212,175,55,0.2)" stroke-width="0.6"/>
          </pattern>
        </defs>
        <circle cx="90" cy="90" r="80" fill="url(#g2)"/>
        <rect x="20" y="120" width="140" height="60" fill="url(#wave2)"/>
        <circle cx="90" cy="90" r="68" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
        <path d="M90 22 A68 68 0 1 1 89.9 22" fill="none" stroke="#1a1a1a" stroke-width="12"
          stroke-dasharray="380 48" stroke-dashoffset="0" stroke-linecap="round" opacity="0.9"/>
        <path d="M28 72 Q35 42 60 30 Q90 18 118 30 Q138 40 148 62
                 Q142 68 134 62 Q118 46 90 38 Q62 30 45 48 Q36 60 38 76Z" fill="#1c1c1c"/>
        <ellipse cx="147" cy="66" rx="11" ry="8" fill="#1c1c1c" transform="rotate(25 147 66)"/>
        <circle cx="152" cy="61" r="2.5" fill="#d4af37" opacity="0.8"/>
        <circle cx="152" cy="61" r="1.2" fill="#080c0a"/>
        <path d="M100 22 Q106 10 114 17 Q108 24 100 22Z" fill="#1c1c1c"/>
        <path d="M70 26 Q72 12 80 17 Q77 26 70 26Z" fill="#1c1c1c"/>
        <path d="M32 75 Q16 66 13 80 Q24 88 36 82Z" fill="#1c1c1c"/>
        <text x="90" y="84" text-anchor="middle" font-size="26" font-weight="900" fill="#d4af37" font-family="'Helvetica Neue',Arial" opacity="0.9">PS</text>
        <text x="90" y="104" text-anchor="middle" font-size="12" fill="rgba(212,175,55,0.6)" font-family="Arial" letter-spacing="5" font-weight="700">ERP</text>
      </svg>
      <div class="card-label">養 殖 現 場 管 理 シ ス テ ム</div>
    </div>
    <div class="card-footer">
      <span style="font-size:10px;color:rgba(212,175,55,0.4);">🌐</span>
      <span class="url">hanatate-erp2.vercel.app</span>
    </div>
  </a>

</div>

<div style="width:120px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.3),transparent);margin:48px auto 16px;"></div>
<div class="footer">© 2026 株式会社花立山養鰻</div>

</body>
</html>
