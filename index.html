<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花立山養鰻 システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#f0f4f0;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Helvetica Neue',Arial,sans-serif;
  padding:40px 16px;
}
.header{text-align:center;margin-bottom:48px;}
.header h1{font-size:22px;font-weight:800;color:#1a2e1a;letter-spacing:4px;margin-bottom:6px;}
.header p{font-size:11px;color:#7aa885;letter-spacing:3px;}
.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.card{
  width:260px;
  background:#fff;
  border:2px solid #d0e4d0;
  border-radius:16px;
  cursor:pointer;text-decoration:none;
  transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
  display:block;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 32px rgba(0,0,0,0.14);
  border-color:#2ecc71;
}
.card-body{
  padding:32px 24px 20px;
  display:flex;flex-direction:column;align-items:center;
}
.eel-svg{width:140px;height:140px;margin-bottom:16px;}
.card-title{font-size:16px;font-weight:800;color:#1a2e1a;letter-spacing:2px;margin-bottom:6px;}
.card-sub{font-size:11px;color:#7aa885;letter-spacing:1px;}
.stamp{
  display:inline-block;
  background:#c0392b;color:#fff;
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:3px;
  letter-spacing:2px;margin-top:10px;
}
.card-footer{
  border-top:1px solid #e8f0e8;
  padding:12px 16px;
  display:flex;align-items:center;gap:8px;
  background:#f8fbf8;
  border-radius:0 0 14px 14px;
}
.card-footer .url{font-size:10px;color:#7aa885;font-family:monospace;}
.footer{margin-top:48px;font-size:10px;color:#aaa;letter-spacing:2px;}
@media(max-width:560px){.card{width:100%;max-width:320px;}}
</style>
</head>
<body>

<div class="header">
  <h1>花立山養鰻</h1>
  <p>HANATATE EEL FARM SYSTEMS</p>
</div>

<div class="cards">

  <!-- BMS -->
  <a class="card" href="https://hanatate-bms.vercel.app" target="_blank">
    <div class="card-body">
      <svg class="eel-svg" viewBox="0 0 140 140">
        <defs>
          <pattern id="w1" x="0" y="0" width="12" height="6" patternUnits="userSpaceOnUse">
            <path d="M0 3 Q3 0 6 3 Q9 6 12 3" fill="none" stroke="#d0e4d0" stroke-width="0.8"/>
          </pattern>
        </defs>
        <circle cx="70" cy="70" r="65" fill="#f0f8f0"/>
        <rect x="5" y="90" width="130" height="50" fill="url(#w1)"/>
        <!-- 円 -->
        <circle cx="70" cy="70" r="52" fill="none" stroke="#2ecc71" stroke-width="6"
          stroke-dasharray="290 44" stroke-dashoffset="8" stroke-linecap="round" opacity="0.7"/>
        <!-- 鰻 -->
        <path d="M22 58 Q30 32 55 24 Q70 18 88 24 Q108 32 118 52
                 Q112 58 105 52 Q90 38 70 34 Q50 28 36 46 Q28 56 30 66Z" fill="#1a7a40"/>
        <ellipse cx="116" cy="56" rx="9" ry="6" fill="#1a7a40" transform="rotate(20 116 56)"/>
        <circle cx="120" cy="52" r="2" fill="#fff"/>
        <circle cx="120" cy="52" r="1" fill="#1a7a40"/>
        <path d="M88 22 Q93 12 100 17 Q96 23 88 22Z" fill="#1a7a40"/>
        <path d="M55 26 Q57 14 64 18 Q61 26 55 26Z" fill="#1a7a40"/>
        <path d="M26 65 Q12 58 10 70 Q20 76 28 72Z" fill="#1a7a40"/>
        <!-- テキスト -->
        <text x="70" y="68" text-anchor="middle" font-size="22" font-weight="900" fill="#1a2e1a" font-family="Arial">PS</text>
        <text x="70" y="82" text-anchor="middle" font-size="8" fill="#7aa885" font-family="Arial" letter-spacing="2">HANATATE</text>
        <text x="70" y="96" text-anchor="middle" font-size="10" fill="#c0392b" font-family="Arial" font-weight="800">2026</text>
      </svg>
      <div class="card-title">販売管理</div>
      <div class="card-sub">受注・売上・ふるさと納税</div>
      <div class="stamp">受注 売上 管理</div>
    </div>
    <div class="card-footer">
      <span>🌐</span>
      <span class="url">hanatate-bms.vercel.app</span>
    </div>
  </a>

  <!-- ERP -->
  <a class="card" href="https://hanatate-erp2.vercel.app" target="_blank">
    <div class="card-body">
      <svg class="eel-svg" viewBox="0 0 140 140">
        <defs>
          <pattern id="w2" x="0" y="0" width="12" height="6" patternUnits="userSpaceOnUse">
            <path d="M0 3 Q3 0 6 3 Q9 6 12 3" fill="none" stroke="#d0e4d0" stroke-width="0.8"/>
          </pattern>
        </defs>
        <circle cx="70" cy="70" r="65" fill="#f0f8f0"/>
        <rect x="5" y="90" width="130" height="50" fill="url(#w2)"/>
        <circle cx="70" cy="70" r="52" fill="none" stroke="#2ecc71" stroke-width="6"
          stroke-dasharray="290 44" stroke-dashoffset="8" stroke-linecap="round" opacity="0.7"/>
        <path d="M22 58 Q30 32 55 24 Q70 18 88 24 Q108 32 118 52
                 Q112 58 105 52 Q90 38 70 34 Q50 28 36 46 Q28 56 30 66Z" fill="#1a7a40"/>
        <ellipse cx="116" cy="56" rx="9" ry="6" fill="#1a7a40" transform="rotate(20 116 56)"/>
        <circle cx="120" cy="52" r="2" fill="#fff"/>
        <circle cx="120" cy="52" r="1" fill="#1a7a40"/>
        <path d="M88 22 Q93 12 100 17 Q96 23 88 22Z" fill="#1a7a40"/>
        <path d="M55 26 Q57 14 64 18 Q61 26 55 26Z" fill="#1a7a40"/>
        <path d="M26 65 Q12 58 10 70 Q20 76 28 72Z" fill="#1a7a40"/>
        <text x="70" y="68" text-anchor="middle" font-size="22" font-weight="900" fill="#1a2e1a" font-family="Arial">PS</text>
        <text x="70" y="86" text-anchor="middle" font-size="10" fill="#7aa885" font-family="Arial" letter-spacing="4" font-weight="700">ERP</text>
      </svg>
      <div class="card-title">養殖管理</div>
      <div class="card-sub">池・水質・給餌・死鰻・薬品</div>
      <div class="stamp">現場管理</div>
    </div>
    <div class="card-footer">
      <span>🌐</span>
      <span class="url">hanatate-erp2.vercel.app</span>
    </div>
  </a>

</div>
<div class="footer">© 2026 株式会社花立山養鰻</div>
</body>
</html>
