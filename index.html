 <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花立山養鰻 システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0a0f0d;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Helvetica Neue',Arial,sans-serif;
  padding:32px 16px;
}
.title{
  color:#2ecc71;
  font-size:11px;
  letter-spacing:3px;
  font-weight:700;
  margin-bottom:40px;
  text-align:center;
}
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}
.card{
  width:240px;
  background:#f5f0e8;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  text-decoration:none;
  transition:transform 0.2s, box-shadow 0.2s;
  display:block;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 48px rgba(0,0,0,0.6);
}
.card-body{
  padding:28px 20px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  background:#f5f0e8;
}
.icon-wrap{
  position:relative;
  width:150px;
  height:150px;
  margin-bottom:8px;
}
.stamp{
  position:absolute;
  right:-4px;
  bottom:4px;
  background:#8b1a1a;
  color:#f5f0e8;
  font-size:9px;
  font-weight:700;
  padding:5px 6px;
  border-radius:3px;
  line-height:1.5;
  text-align:center;
  writing-mode:vertical-rl;
  letter-spacing:2px;
  border:1.5px solid #f5f0e8;
}
.wave-section{
  position:relative;
  height:48px;
  background:#e8e0d0;
  overflow:hidden;
}
.card-footer{
  background:#e8e0d0;
  padding:8px 14px 12px;
  display:flex;
  align-items:center;
  gap:6px;
}
.card-footer span.icon{font-size:12px;}
.card-footer span.url{
  font-size:10px;
  color:#555;
  word-break:break-all;
  font-family:monospace;
}
.copy{
  margin-top:48px;
  font-size:10px;
  color:#2ecc71;
  letter-spacing:2px;
  opacity:0.5;
}
@media(max-width:540px){
  .cards{gap:16px;}
  .card{width:100%;max-width:300px;}
}
</style>
</head>
<body>

<div class="title">🐟 HANATATE SYSTEMS 🐟</div>

<div class="cards">

  <!-- BMS -->
  <a class="card" href="https://hanatate-bms.vercel.app" target="_blank">
    <div class="card-body">
      <div class="icon-wrap">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <!-- 波模様 -->
          <defs>
            <pattern id="w1" x="0" y="0" width="18" height="9" patternUnits="userSpaceOnUse">
              <path d="M0 4.5 Q4.5 0 9 4.5 Q13.5 9 18 4.5" fill="none" stroke="#c8b89a" stroke-width="0.8"/>
            </pattern>
            <clipPath id="c1"><circle cx="75" cy="72" r="55"/></clipPath>
          </defs>
          <!-- 波背景（円の下半分） -->
          <rect x="20" y="95" width="110" height="55" fill="url(#w1)" opacity="0.6"/>
          <!-- 墨絵風の円 -->
          <circle cx="75" cy="72" r="52" fill="none" stroke="#1a1a1a" stroke-width="7"
            stroke-dasharray="290 40" stroke-dashoffset="15" stroke-linecap="round" opacity="0.9"/>
          <!-- 鰻（上部） -->
          <path d="M58 22 Q75 12 92 22 Q88 30 75 28 Q62 30 58 22Z" fill="#1a1a1a"/>
          <path d="M50 18 Q58 10 65 18 Q60 24 52 22Z" fill="#1a1a1a"/>
          <circle cx="85" cy="20" r="1.5" fill="#f5f0e8"/>
          <!-- PSテキスト -->
          <text x="75" y="65" text-anchor="middle" font-size="32" font-weight="900" fill="#1a1a1a" font-family="'Helvetica Neue',Arial">PS</text>
          <!-- HANATATE -->
          <text x="75" y="82" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial" letter-spacing="2" font-weight="500">HANATATE</text>
          <!-- 2026 -->
          <text x="75" y="98" text-anchor="middle" font-size="13" fill="#8b1a1a" font-family="Arial" font-weight="700">2026</text>
        </svg>
        <div class="stamp">受注<br/>売上<br/>管理</div>
      </div>
    </div>
    <div class="card-footer">
      <span class="icon">🌐</span>
      <span class="url">hanatate-bms.vercel.app</span>
    </div>
  </a>

  <!-- ERP -->
  <a class="card" href="https://hanatate-erp2.vercel.app" target="_blank">
    <div class="card-body">
      <div class="icon-wrap">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <defs>
            <pattern id="w2" x="0" y="0" width="18" height="9" patternUnits="userSpaceOnUse">
              <path d="M0 4.5 Q4.5 0 9 4.5 Q13.5 9 18 4.5" fill="none" stroke="#c8b89a" stroke-width="0.8"/>
            </pattern>
          </defs>
          <rect x="20" y="95" width="110" height="55" fill="url(#w2)" opacity="0.6"/>
          <circle cx="75" cy="72" r="52" fill="none" stroke="#1a1a1a" stroke-width="7"
            stroke-dasharray="290 40" stroke-dashoffset="15" stroke-linecap="round" opacity="0.9"/>
          <path d="M58 22 Q75 12 92 22 Q88 30 75 28 Q62 30 58 22Z" fill="#1a1a1a"/>
          <path d="M50 18 Q58 10 65 18 Q60 24 52 22Z" fill="#1a1a1a"/>
          <circle cx="85" cy="20" r="1.5" fill="#f5f0e8"/>
          <text x="75" y="65" text-anchor="middle" font-size="32" font-weight="900" fill="#1a1a1a" font-family="'Helvetica Neue',Arial">PS</text>
          <text x="75" y="88" text-anchor="middle" font-size="13" fill="#1a1a1a" font-family="Arial" letter-spacing="4" font-weight="500">ERP</text>
        </svg>
        <div class="stamp">現場<br/>管理</div>
      </div>
    </div>
    <div class="card-footer">
      <span class="icon">🌐</span>
      <span class="url">hanatate-erp2.vercel.app</span>
    </div>
  </a>

</div>

<div class="copy">© 2026 花立山養鰻株式会社</div>

</body>
</html>
